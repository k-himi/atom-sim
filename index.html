<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>原子構造シミュレーター</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+JP:wght@300;400;500;700&display=swap');

  :root {
    --bg: #050a14;
    --surface: #0a1628;
    --surface2: #0f1f3d;
    --proton: #ff4d6d;
    --neutron: #f0f0f0;
    --electron: #ffd166;
    --accent: #ffd166;
    --text: #e8f4fd;
    --muted: #7a9bb5;
    --border: #1a3a5c;
    --glow-p: rgba(255,77,109,0.4);
    --glow-n: rgba(240,240,240,0.4);
    --glow-e: rgba(255,209,102,0.5);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,0.15) 0%, transparent 100%),
      radial-gradient(1px 1px at 80% 10%, rgba(255,255,255,0.1) 0%, transparent 100%),
      radial-gradient(1px 1px at 50% 70%, rgba(255,255,255,0.12) 0%, transparent 100%),
      radial-gradient(1px 1px at 10% 80%, rgba(255,255,255,0.08) 0%, transparent 100%),
      radial-gradient(2px 2px at 35% 15%, rgba(126,184,247,0.2) 0%, transparent 100%),
      radial-gradient(2px 2px at 65% 85%, rgba(255,77,109,0.15) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  header {
    text-align: center;
    padding: 28px 20px 12px;
    position: relative;
    z-index: 1;
  }

  header h1 {
    font-family: 'Orbitron', monospace;
    font-size: clamp(16px, 3.5vw, 28px);
    font-weight: 900;
    letter-spacing: 0.1em;
    background: linear-gradient(135deg, var(--proton), var(--accent), var(--electron));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 4px;
  }

  header p { color: var(--muted); font-size: 12px; font-weight: 300; }

  .tabs {
    display: flex;
    justify-content: center;
    gap: 8px;
    padding: 0 20px 16px;
    position: relative;
    z-index: 1;
  }

  .tab-btn {
    padding: 8px 24px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-size: 13px;
    font-family: 'Noto Sans JP', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
  }

  .tab-btn.active { background: var(--surface2); border-color: var(--accent); color: var(--accent); }
  .tab-btn:hover:not(.active) { border-color: var(--muted); color: var(--text); }

  .tab-content { display: none; }
  .tab-content.active {
    display: block;
    animation: tabSlideIn 0.25s ease;
  }

  @keyframes tabSlideIn {
    from { opacity: 0; transform: translateX(30px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  .main-layout {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    max-width: 960px;
    margin: 0 auto;
    padding: 0 20px 40px;
    position: relative;
    z-index: 1;
  }

  .nucleus-container { position: relative; width: 160px; height: 160px; margin-bottom: 12px; overflow: visible; }

  .orbit {
    position: absolute; border-radius: 50%;
    border: 1px solid rgba(168,255,120,0.15);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    animation: orbit-pulse 3s ease-in-out infinite;
    transition: opacity 0.4s ease;
  }

  @keyframes orbit-pulse {
    0%, 100% { border-color: rgba(168,255,120,0.15); }
    50%       { border-color: rgba(168,255,120,0.3); }
  }

  /* 殻サイズ定義 K〜P */
  .orbit-1 { width:  46px; height:  46px; }                        /* K殻 */
  .orbit-2 { width:  80px; height:  80px; animation-delay: 0.5s; } /* L殻 */
  .orbit-3 { width: 116px; height: 116px; animation-delay: 1s; }   /* M殻 */
  .orbit-4 { width: 150px; height: 150px; animation-delay: 1.5s; } /* N殻 */
  .orbit-5 { width: 186px; height: 186px; animation-delay: 2s; }   /* O殻 */
  .orbit-6 { width: 222px; height: 222px; animation-delay: 2.5s; } /* P殻 */

  /* 殻名ラベル */
  .orbit-label {
    position: absolute;
    font-family: 'Orbitron', monospace;
    font-size: 8px;
    color: rgba(168,255,120,0.4);
    pointer-events: none;
    top: 50%;
    transform: translateY(-50%);
    line-height: 1;
  }

  .electron-dot {
    position: absolute; width: 6px; height: 6px;
    background: var(--electron); border-radius: 50%;
    box-shadow: 0 0 5px var(--glow-e), 0 0 10px var(--glow-e);
    transform: translate(-50%, -50%);
    transition: box-shadow 0.3s;
  }

  /* 希ガス電子配置エフェクト */
  .electron-dot.noble {
    background: var(--electron);
    box-shadow: 0 0 8px var(--electron), 0 0 16px var(--glow-e), 0 0 28px var(--glow-e);
    animation: noble-pulse 1.2s ease-in-out infinite;
  }

  @keyframes noble-pulse {
    0%, 100% { opacity: 1; box-shadow: 0 0 8px var(--electron), 0 0 16px var(--glow-e), 0 0 28px var(--glow-e); }
    50%       { opacity: 0.4; box-shadow: 0 0 4px var(--electron), 0 0 8px var(--glow-e); }
  }

  .noble-gas-badge {
    position: absolute;
    top: 4px;
    left: 50%;
    transform: translateX(-50%);
    background: linear-gradient(135deg, #a8f0ff, #7eb8f7);
    color: #050a14;
    font-family: 'Orbitron', monospace;
    font-size: 8px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 8px;
    white-space: nowrap;
    z-index: 20;
    animation: badge-pop 0.4s cubic-bezier(0.34,1.56,0.64,1) forwards;
    pointer-events: none;
  }

  @keyframes badge-pop {
    from { opacity: 0; transform: translateX(-50%) scale(0.6); }
    to   { opacity: 1; transform: translateX(-50%) scale(1); }
  }

  #nucleus {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 80px; height: 80px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.4s ease;
  }

  #nucleus canvas { position: absolute; inset: 0; border-radius: 50%; }
  #nucleus-label { position: relative; z-index: 2; text-align: center; pointer-events: none; }
  #nucleus-label .mass-num { font-family: 'Orbitron', monospace; font-size: 18px; font-weight: 700; color: white; text-shadow: 0 0 10px rgba(255,255,255,0.8); line-height: 1; }
  #nucleus-label .pn-ratio { font-size: 9px; color: rgba(255,255,255,0.6); margin-top: 2px; }

  /* ===== ボーアモデル＋オーバーレイラッパー ===== */
  .bohr-wrap {
    position: relative;
    width: 340px;
    flex-shrink: 0;
  }

  /* ボーアモデル本体（核種カード重ね時は半透明） */
  .bohr-wrap.has-nuclide .nucleus-container {
    opacity: 0.5;
    transition: opacity 0.4s ease;
  }

  .bohr-wrap.has-nuclide .nucleus-container:hover {
    opacity: 0.9;
  }

  /* 核種情報オーバーレイ（右上に絶対配置・小さめ） */
  #element-card {
    position: absolute;
    top: 0;
    right: 0;
    width: 120px;
    background: rgba(8, 18, 34, 0.88);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px 10px 8px;
    text-align: center;
    z-index: 10;
    transition: all 0.4s ease;
    pointer-events: auto;
  }

  #element-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--card-gradient, transparent);
    opacity: 0.1;
    border-radius: 10px;
    pointer-events: none;
  }

  .empty-state-sm {
    color: var(--muted);
    font-size: 18px;
    padding: 8px 0;
    line-height: 1.4;
  }

  .element-name-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
    margin: 2px 0 1px;
  }

  .wiki-link {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: rgba(126,184,247,0.15);
    border: 1px solid rgba(126,184,247,0.4);
    color: var(--neutron);
    font-size: 11px;
    font-weight: 900;
    font-family: sans-serif;
    text-decoration: none;
    transition: all 0.2s;
    flex-shrink: 0;
    position: relative;
    z-index: 2;
  }

  .wiki-link:hover {
    background: rgba(126,184,247,0.35);
    border-color: var(--neutron);
    box-shadow: 0 0 6px rgba(126,184,247,0.5);
    transform: scale(1.15);
  }

  .element-symbol-link, .element-name-link { text-decoration: none; display: block; position: relative; z-index: 2; }
  .element-symbol-link:hover .element-symbol { filter: brightness(1.3); }
  .element-name-link:hover .element-name { text-decoration: underline; opacity: 0.85; }

  .element-symbol { font-family: 'Orbitron', monospace; font-size: 28px; font-weight: 900; line-height: 1; background: var(--symbol-gradient, linear-gradient(135deg, #7eb8f7, #a8ff78)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .element-name   { font-size: 11px; font-weight: 700; margin: 2px 0 1px; }
  .nuclide-name   { font-family: 'Orbitron', monospace; font-size: 8px; color: var(--accent); letter-spacing: 0.03em; margin-bottom: 5px; }

  .element-tags   { display: flex; flex-wrap: wrap; gap: 3px; justify-content: center; margin-bottom: 5px; }

  .tag { padding: 1px 5px; border-radius: 20px; font-size: 8px; font-weight: 500; border: 1px solid; }
  .tag-stable   { background: rgba(168,255,120,0.1); border-color: rgba(168,255,120,0.4); color: var(--electron); }
  .tag-unstable { background: rgba(255,77,109,0.1);  border-color: rgba(255,77,109,0.4);  color: var(--proton); }
  .tag-unknown  { background: rgba(122,155,181,0.1); border-color: rgba(122,155,181,0.4); color: var(--muted); }
  .tag-ion      { background: rgba(255,209,102,0.1); border-color: rgba(255,209,102,0.4); color: var(--accent); }
  .tag-category { background: rgba(126,184,247,0.1); border-color: rgba(126,184,247,0.4); color: var(--neutron); }

  .collect-btn {
    margin-top: 5px;
    margin-bottom: 0;
    width: 100%;
    padding: 5px 4px;
    border-radius: 7px;
    border: 1px solid var(--accent);
    background: rgba(255,209,102,0.08);
    color: var(--accent);
    font-size: 9px;
    font-family: 'Noto Sans JP', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
    font-weight: 500;
    pointer-events: all;
    position: relative;
    z-index: 2;
  }

  .collect-btn:hover { background: rgba(255,209,102,0.18); }
  .collect-btn.already { border-color: var(--electron); color: var(--electron); background: rgba(168,255,120,0.08); cursor: default; }

  .ion-name-badge {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 11px;
    font-weight: 700;
    color: var(--accent);
    background: rgba(255,209,102,0.1);
    border: 1px solid rgba(255,209,102,0.35);
    border-radius: 8px;
    padding: 3px 8px;
    margin: 4px 0 2px;
    text-align: center;
    animation: fadeIn 0.3s ease;
  }

  .stability-row { display: flex; align-items: center; gap: 6px; margin-top: 8px; }
  .stability-bar { flex: 1; height: 3px; border-radius: 2px; overflow: hidden; background: var(--border); }
  .stability-fill { height: 100%; border-radius: 2px; transition: width 0.4s ease, background 0.4s ease; }
  .stability-label { font-size: 8px; color: var(--muted); letter-spacing: 0.05em; flex-shrink: 0; }

  /* マーキーバー（ボーアモデル下・コントロール上） */
  .marquee-bar {
    width: 340px;
    overflow: hidden;
    padding: 6px 0;
    border-top: 1px solid rgba(255,255,255,0.06);
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }

  /* 解説マーキー */
  .desc-marquee-wrap {
    overflow: hidden;
    width: 100%;
  }

  .desc-marquee-track {
    display: inline-flex;
    white-space: nowrap;
    will-change: transform;
  }

  .element-desc {
    font-size: 11px;
    color: var(--muted);
    line-height: 1.6;
    white-space: nowrap;
    padding-right: 60px;
  }

  /* ===== 玉＋上下ボタン コントロール ===== */
  .controls {
    display: flex;
    flex-direction: row;
    gap: 8px;
    width: auto;
    justify-content: center;
    align-items: stretch;
  }

  /* 各粒子ユニット（＋ / 玉+数字 / −を縦に並べる） */
  .particle-unit {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    width: 72px;
    flex-shrink: 0;
  }

  .count-btn {
    width: 100%;
    height: 36px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-size: 20px; font-weight: 700;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    user-select: none;
  }

  .count-btn:hover { border-color: var(--accent); color: var(--accent); transform: scale(1.03); }
  .count-btn:active { transform: scale(0.95); }

  /* 玉＋数字エリア */
  .particle-center {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 6px 0;
  }

  .particle-ball {
    width: 36px; height: 36px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .ball-proton {
    background: radial-gradient(circle at 38% 35%, #ff8fa3, #c9184a);
    box-shadow: 0 0 10px var(--glow-p), 0 0 20px var(--glow-p);
  }

  .ball-neutron {
    background: radial-gradient(circle at 38% 35%, #ffffff, #c0c0c0);
    box-shadow: 0 0 10px var(--glow-n), 0 0 18px var(--glow-n);
  }

  .ball-electron {
    background: radial-gradient(circle at 38% 35%, #ffe680, #e6a800);
    box-shadow: 0 0 10px var(--glow-e), 0 0 18px var(--glow-e);
  }

  .count-display {
    font-family: 'Orbitron', monospace;
    font-size: 22px; font-weight: 900;
    line-height: 1;
    text-align: center;
  }

  .count-p { color: var(--proton); }
  .count-n { color: var(--neutron); text-shadow: 0 0 8px rgba(200,200,200,0.5); }
  .count-e { color: var(--electron); }
  .count-label { font-size: 9px; color: var(--muted); margin-top: 0; }

  .summary-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 10px 8px;
    flex: 1.4;
    min-width: 0;
    max-width: 140px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
  }

  /* 核種記法レイアウト */
  .nuclide-notation {
    display: flex;
    align-items: center;
    gap: 2px;
  }

  .notation-scripts {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    line-height: 1;
    margin-right: 1px;
  }

  .notation-mass {
    font-family: 'Orbitron', monospace;
    font-size: 14px;
    font-weight: 700;
    color: #4fc3f7;
    line-height: 1.1;
  }

  .notation-atomic {
    font-family: 'Orbitron', monospace;
    font-size: 11px;
    font-weight: 700;
    color: var(--proton);
    line-height: 1.1;
  }

  .notation-symbol-wrap {
    position: relative;
    display: inline-flex;
    align-items: flex-end;
    padding-right: 26px;
  }

  .notation-symbol {
    font-family: 'Orbitron', monospace;
    font-size: 28px;
    font-weight: 900;
    color: var(--text);
    line-height: 1;
  }

  .notation-charge {
    position: absolute;
    top: -2px;
    right: 0;
    font-family: 'Orbitron', monospace;
    font-size: 12px;
    font-weight: 700;
    color: var(--accent);
    line-height: 1;
    min-width: 14px;
    text-align: left;
  }

  /* ===== 電荷バランス棒グラフ ===== */
  .charge-chart {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 12px 16px 10px;
    width: 100%;
    max-width: 380px;
  }

  .charge-chart-title {
    font-family: 'Orbitron', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.08em;
    margin-bottom: 10px;
  }

  .charge-bars {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .charge-bar-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .charge-bar-label {
    font-family: 'Orbitron', monospace;
    font-size: 10px;
    font-weight: 700;
    width: 52px;
    flex-shrink: 0;
    text-align: right;
  }

  .proton-label   { color: var(--proton); }
  .electron-label { color: var(--electron); }

  .charge-bar-track {
    flex: 1;
    height: 14px;
    background: var(--surface2);
    border-radius: 7px;
    overflow: hidden;
    position: relative;
  }

  .charge-bar-fill {
    height: 100%;
    border-radius: 7px;
    transition: width 0.35s ease;
    width: 0%;
    min-width: 0;
  }

  .proton-fill {
    background: linear-gradient(90deg, #c9184a, #ff4d6d);
    box-shadow: 0 0 6px rgba(255,77,109,0.5);
  }

  .electron-fill {
    background: linear-gradient(90deg, #e6a800, #ffd166);
    box-shadow: 0 0 6px rgba(255,209,102,0.5);
  }

  /* 差分表示行 */
  .charge-diff-row {
    display: flex;
    align-items: center;
    gap: 0;
    margin-top: 6px;
    padding-left: 60px;
    min-height: 36px;
    position: relative;
  }

  /* ラインと価数をまとめるラッパー */
  .charge-diff-wrap {
    position: relative;
    flex: 1;
    height: 36px;
  }

  .charge-diff-line {
    position: absolute;
    bottom: 6px;
    left: 0;
    height: 3px;
    background: transparent;
    border-radius: 2px;
    transition: width 0.35s ease, margin-left 0.35s ease, background 0.35s ease;
  }

  /* 差分ブラケット（両端の縦線） */
  .charge-diff-line::before,
  .charge-diff-line::after {
    content: '';
    position: absolute;
    bottom: 0;
    width: 2px;
    height: 8px;
    border-radius: 1px;
    background: inherit;
    filter: brightness(1.4);
  }
  .charge-diff-line::before { left: 0; }
  .charge-diff-line::after  { right: 0; }

  .charge-diff-label {
    position: absolute;
    bottom: 10px;
    left: 0;
    width: 100%;
    text-align: center;
    font-family: 'Orbitron', monospace;
    font-size: 20px;
    font-weight: 900;
    line-height: 1;
    transition: color 0.3s, opacity 0.3s;
    pointer-events: none;
  }

  .charge-neutral-label {
    font-family: 'Orbitron', monospace;
    font-size: 12px;
    font-weight: 700;
    color: var(--electron);
    flex: 1;
    text-align: center;
  }

  /* ===== 周期表 ===== */
  .ptable-scroll {
    width: 100%;
    overflow-x: auto;
    border: 1px solid var(--border);
    border-radius: 14px;
    background: var(--surface);
    padding: 12px;
  }

  .ptable-wrap {
    display: grid;
    grid-template-columns: repeat(18, 38px);
    grid-template-rows: repeat(10, 46px);
    gap: 3px;
    min-width: 720px;
  }

  .pt-cell {
    border-radius: 6px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    border: 1px solid rgba(255,255,255,0.08);
    position: relative;
    padding: 2px;
  }

  .pt-cell:hover {
    transform: scale(1.15);
    z-index: 10;
  }

  .pt-cell .pt-z {
    font-family: 'Orbitron', monospace;
    font-size: 7px;
    color: rgba(255,255,255,0.5);
    line-height: 1;
    align-self: flex-start;
    padding-left: 2px;
  }

  .pt-cell .pt-sym {
    font-family: 'Orbitron', monospace;
    font-size: 13px;
    font-weight: 900;
    color: #fff;
    line-height: 1;
  }

  .pt-cell .pt-name {
    font-size: 6px;
    color: rgba(255,255,255,0.6);
    line-height: 1;
    margin-top: 1px;
    text-align: center;
    white-space: nowrap;
    overflow: hidden;
    max-width: 36px;
    text-overflow: ellipsis;
  }

  .pt-gap { /* 空白セル */ }

  .ptable-legend {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
  }

  .ptable-legend-item {
    display: flex;

// ===== JSマーキーエンジン =====
const marqueeState = {
  pos: 0, halfWidth: 0, speed: 0.3, raf: null,
  lastTime: null,
  dragging: false, dragStartX: 0, dragStartPos: 0, touchOnMarquee: false,
};

function marqueeStart() {
  cancelAnimationFrame(marqueeState.raf);
  const track = document.getElementById('marqueeTrack');
  if (!track) return;
  marqueeState.halfWidth = track.scrollWidth / 2;
  marqueeState.pos = 0;
  marqueeState.lastTime = null;
  marqueeLoop();
}

function marqueeLoop(timestamp) {
  if (marqueeState.dragging) {
    marqueeState.raf = requestAnimationFrame(marqueeLoop);
    return;
  }
  const track = document.getElementById('marqueeTrack');
  if (!track) return;

  // 時間ベース（px/秒）で速度を統一
  const PX_PER_SEC = 36;
  if (marqueeState.lastTime != null) {
    const dt = (timestamp - marqueeState.lastTime) / 1000;
    marqueeState.pos -= PX_PER_SEC * dt;
    if (marqueeState.halfWidth > 0 && -marqueeState.pos >= marqueeState.halfWidth) {
      marqueeState.pos += marqueeState.halfWidth;
    }
    track.style.transform = `translateX(${marqueeState.pos}px)`;
  }
  marqueeState.lastTime = timestamp;
  marqueeState.raf = requestAnimationFrame(marqueeLoop);
}

function marqueeStop() {
  cancelAnimationFrame(marqueeState.raf);
  marqueeState.raf = null;
  const track = document.getElementById('marqueeTrack');
  if (track) track.style.transform = 'translateX(0)';
  marqueeState.pos = 0;
}

// マーキーバーへのタッチで巻き戻し
document.addEventListener('touchstart', e => {
  const bar = document.getElementById('marqueeBar');
  if (!bar || bar.style.display === 'none') return;
  if (bar.contains(e.target)) {
    marqueeState.touchOnMarquee = true;
    marqueeState.dragging = true;
    marqueeState.dragStartX = e.touches[0].clientX;
    marqueeState.dragStartPos = marqueeState.pos;
  }
}, { passive: true });

document.addEventListener('touchmove', e => {
  if (!marqueeState.dragging || !marqueeState.touchOnMarquee) return;
  const dx = e.touches[0].clientX - marqueeState.dragStartX;
  const track = document.getElementById('marqueeTrack');
  if (!track) return;
  let newPos = marqueeState.dragStartPos + dx;
  const hw = marqueeState.halfWidth;
  if (hw > 0) {
    if (newPos > 0) newPos -= hw;
    if (newPos < -hw) newPos += hw;
  }
  marqueeState.pos = newPos;
  track.style.transform = `translateX(${newPos}px)`;
}, { passive: true });

document.addEventListener('touchend', () => {
  if (marqueeState.touchOnMarquee) {
    marqueeState.dragging = false;
    marqueeState.touchOnMarquee = false;
  }
}, { passive: true });

// 観測されている放射性核種（Z=1〜83のうちよく知られたもの）
// 安定でない = 放射性。unknown は未観測・極短寿命
function estimateStability(z, nv) {
  if (z === 0 && nv === 0) return 'none';
  if (z === 0) return 'unstable';
  if (z >= 84) return 'unstable'; // Z≥84は全核種放射性
  const key = `${z}-${nv}`;
  if (STABLE_NUCLIDES.has(key)) return 'stable';
  // A = z+nv が現実的な範囲か
  const A = z + nv;
  if (A < z || nv < 0) return 'unknown';
  // 存在が知られている範囲（ドリップラインの概算）
  const nMin = Math.max(0, Math.round(z * 0.4));
  const nMax = Math.round(z * 1.8 + 10);
  if (nv < nMin || nv > nMax) return 'unknown';
  return 'unstable'; // 範囲内だが安定でない → 放射性
}

function stabColor(s) {
  if (s === 'stable')   return '#a8ff78';
  if (s === 'unstable') return '#ff4d6d';
  if (s === 'unknown')  return '#ffd166';
  return '#2a4a6a';
}

// ===== メインUI =====
function update() {
  document.getElementById('pCount').textContent = p;
  document.getElementById('nCount').textContent = n;
  document.getElementById('eCount').textContent = e;
  const A = p + n, charge = p - e;
  document.getElementById('sumZ').textContent = p;
  document.getElementById('sumA').textContent = A;
  // 元素記号
  const el = getElement(p);
  document.getElementById('sumSym').textContent = p === 0 ? '?' : (el ? el.sym : '?');
  // 電荷（中性は非表示、±1は数字なし、±2以上は数字+符号）
  const chargeEl = document.getElementById('sumCharge');
  if (charge === 0) {
    chargeEl.textContent = '';
  } else if (charge === 1) {
    chargeEl.textContent = '+';
  } else if (charge === -1) {
    chargeEl.textContent = '−';
  } else if (charge > 1) {
    chargeEl.textContent = charge + '+';
  } else {
    chargeEl.textContent = Math.abs(charge) + '−';
  }
  updateNuclideInfo();
  drawNucleus();
  drawElectrons();
  updateOrbits();
  updateChargeChart();

  // 自動コレクション：タイマーリセット
  clearTimeout(autoCollectTimer);
  stopCountdownBar();
  if (p > 0 && !collection.some(c => c.z === p && c.n_val === n)) {
    startCountdownBar();
    autoCollectTimer = setTimeout(() => {
      if (p > 0 && !collection.some(c => c.z === p && c.n_val === n)) {
        collectNuclide(true);
      }
    }, AUTO_COLLECT_DELAY);
  }
}

  const marqueeBar   = document.getElementById('marqueeBar');
  const marqueeText1 = document.getElementById('marqueeText1');
  const marqueeText2 = document.getElementById('marqueeText2');

  if (p === 0) {
    card.innerHTML = `<div class="empty-state-sm">⚛<br><span style="font-size:10px">陽子を追加</span></div>`;
    card.style.setProperty('--card-gradient','transparent');
    bohrWrap.classList.remove('has-nuclide');
    marqueeBar.style.display = 'none';
    marqueeStop();
    return;
  }

  const el = getElement(p);
  const stability = estimateStability(p, n);
  let symbolHtml, nameHtml, nuclide, desc, tags = [];

  if (el) {
    card.style.setProperty('--symbol-gradient', `linear-gradient(135deg,${el.color1},${el.color2})`);
    card.style.setProperty('--card-gradient',   `linear-gradient(135deg,${el.color1},${el.color2})`);
    const wikiUrl = `https://ja.wikipedia.org/wiki/${encodeURIComponent(el.name)}`;
    symbolHtml = `<div class="element-symbol fade-in">${el.sym}</div>`;
    nameHtml   = `<div class="element-name-row"><div class="element-name">${el.name}</div><a href="${wikiUrl}" target="_blank" rel="noopener" class="wiki-link" title="Wikipediaで調べる">🔍</a></div>`;
    nuclide    = A > 0 ? `<sup>${A}</sup>${el.sym}` : el.sym;
    desc       = el.desc;
    const iso = {'H':{1:'プロチウム',2:'重水素(D)',3:'三重水素(T)'},'C':{12:'炭素-12（質量基準）',14:'放射性炭素'},'U':{235:'ウラン-235（核分裂）',238:'ウラン-238（天然最多）'}};
    if (iso[el.sym] && iso[el.sym][A]) nuclide += `「${iso[el.sym][A]}」`;
  } else {
    card.style.setProperty('--symbol-gradient','linear-gradient(135deg,#ff4d6d,#ffd166)');
    card.style.setProperty('--card-gradient','linear-gradient(135deg,#ff4d6d,#ffd166)');
    symbolHtml = `<div class="element-symbol fade-in">?</div>`;
    nameHtml   = `<div class="element-name">未確認元素</div>`;
    nuclide    = `Z=${p}`;
    desc       = `原子番号 ${p} の元素はまだ正式に命名・合成されていません。`;
  }

  if (stability==='stable')        tags.push(`<span class="tag tag-stable">✓ 安定</span>`);
  else if (stability==='unstable') tags.push(`<span class="tag tag-unstable">☢ 放射性</span>`);
  else if (stability==='unknown')  tags.push(`<span class="tag tag-unknown">? 不明</span>`);

  if (charge>0)       tags.push(`<span class="tag tag-ion">+${charge}</span>`);
  else if (charge<0)  tags.push(`<span class="tag tag-ion">${charge}</span>`);
  if (el) tags.push(`<span class="tag tag-category">${el.cat}</span>`);

  // イオン名（陽子数と電荷の組み合わせで検索）
  const ionName = charge !== 0 ? getIonName(p, charge) : null;

  let stabPct=0, sColor='#ff4d6d';
  if (stability==='stable')        { stabPct=100; sColor='#a8ff78'; }
  else if (stability==='unknown')  { stabPct=40;  sColor='#ffd166'; }
  else if (stability==='unstable') { stabPct=15;  sColor='#ff4d6d'; }

  const isCollected = collection.some(c => c.z===p && c.n_val===n);

  // オーバーレイカード
  card.innerHTML = `
    ${symbolHtml}
    ${nameHtml}
    <div class="nuclide-name">${nuclide}<br>A=${A} Z=${p} N=${n}</div>
    <div class="element-tags">${tags.join('')}</div>
    ${ionName ? `<div class="ion-name-badge">${ionName}</div>` : ''}
    <div class="stability-row"><span class="stability-label">安定性</span><div class="stability-bar"><div class="stability-fill" style="width:${stabPct}%;background:${sColor}"></div></div></div>
    ${p>0 ? `<button class="collect-btn ${isCollected?'already':''}" onclick="collectNuclide()">${isCollected ? '✓ 済み' : '＋ コレクション'}</button>` : ''}
  `;

  // ボーアモデルを半透明に
  bohrWrap.classList.add('has-nuclide');

  // マーキー解説
  const text = desc || '';
  marqueeText1.textContent = text;
  marqueeText2.textContent = text;
  marqueeBar.style.display = 'block';
  // テキスト幅確定後に開始
  requestAnimationFrame(() => marqueeStart());
}

// ===== コレクション操作 =====
function collectNuclide(auto = false) {
  if (p===0) return;
  if (collection.some(c=>c.z===p && c.n_val===n)) {
    if (!auto) showToast('すでにコレクション済みです');
    return;
  }
  const el = getElement(p);
  const stability = estimateStability(p, n);
  collection.push({ z:p, n_val:n, stability, sym:el?el.sym:'?', name:el?el.name:`Z=${p}`, A:p+n, color1:el?el.color1:'#ff4d6d', color2:el?el.color2:'#ffd166' });
  saveCollection();
  stopCountdownBar();
  updateNuclideInfo();
  updateBadge();
  showToast(`${el?el.sym:'?'}-${p+n} をコレクションしました！`);
  // 核種マップタブが開いていれば再描画＋スクロール
  if (document.getElementById('tab-chart').classList.contains('active')) {
    renderCollection(); renderChart();
    requestAnimationFrame(scrollToLatestNuclide);
  }
}

// カウントダウンバー
let countdownRaf = null;
let countdownStart = null;

function startCountdownBar() {
  const bar   = document.getElementById('autoCollectBar');
  const barBg = document.getElementById('autoCollectBarBg');
  if (!bar) return;
  bar.style.display   = 'block';
  barBg.style.display = 'block';
  bar.style.width = '100%';
  countdownStart = performance.now();

  function tick(now) {
    const elapsed = now - countdownStart;
    const pct = Math.max(0, 100 - (elapsed / AUTO_COLLECT_DELAY) * 100);
    bar.style.width = pct + '%';
    if (pct > 0) countdownRaf = requestAnimationFrame(tick);
    else { bar.style.display = 'none'; barBg.style.display = 'none'; }
  }
  countdownRaf = requestAnimationFrame(tick);
}

function stopCountdownBar() {
  cancelAnimationFrame(countdownRaf);
  const bar   = document.getElementById('autoCollectBar');
  const barBg = document.getElementById('autoCollectBarBg');
  if (bar)   { bar.style.display   = 'none'; bar.style.width = '100%'; }
  if (barBg) { barBg.style.display = 'none'; }
}

function removeFromCollection(z, nv) {
  const idx = collection.findIndex(c=>c.z===z && c.n_val===nv);
  if (idx>=0) collection.splice(idx,1);
  saveCollection();
  renderCollection(); renderChart(); updateBadge(); updateNuclideInfo();
}

function clearCollection() {
  if (!collection.length) return;
  if (!confirm('コレクションをすべて削除しますか？')) return;
  collection = [];
  saveCollection();
  renderCollection(); renderChart(); updateBadge(); updateNuclideInfo();
}

function updateBadge() {
  const b = document.getElementById('collBadge');
  b.style.display = collection.length ? 'inline' : 'none';
  b.textContent = collection.length;
}

// ===== 核種マップ Canvas =====
const CELL=10, PAD=40, Z_MAX=83, N_MAX=130;

function renderChart() {
  const canvas = document.getElementById('nuclideChart');
  const W = PAD + (N_MAX+1)*CELL + 20;
  const H = PAD + (Z_MAX+1)*CELL + 20;
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#050a14'; ctx.fillRect(0,0,W,H);

  // 全安定核種を薄く表示
  for (const key of STABLE_NUCLIDES) {
    const [zs, ns] = key.split('-').map(Number);
    if (zs > Z_MAX || ns > N_MAX) continue;
    const x = PAD + ns*CELL, y = H - PAD - (zs+1)*CELL;
    ctx.fillStyle = 'rgba(168,255,120,0.22)';
    ctx.fillRect(x+1, y+1, CELL-2, CELL-2);
  }

  // 放射性核種域（ドリップライン内）を極薄く
  for (let z=1; z<=Z_MAX; z++) {
    const nMin = Math.max(0, Math.round(z*0.4));
    const nMax = Math.min(N_MAX, Math.round(z*1.8+10));
    for (let nv=nMin; nv<=nMax; nv++) {
      if (STABLE_NUCLIDES.has(z+'-'+nv)) continue;
      const x = PAD + nv*CELL, y = H - PAD - (z+1)*CELL;
      ctx.fillStyle = 'rgba(255,77,109,0.09)';
      ctx.fillRect(x+1, y+1, CELL-2, CELL-2);
    }
  }

  // 魔法数ライン
  const magicN = [2,8,20,28,50,82,126];
  const magicZ = [2,8,20,28,50,82];
  ctx.strokeStyle = 'rgba(255,209,102,0.22)';
  ctx.lineWidth = 0.8; ctx.setLineDash([2,4]);
  for (const mn of magicN) {
    if (mn > N_MAX) continue;
    const x = PAD + mn*CELL + CELL/2;
    ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x, H-PAD); ctx.stroke();
  }
  for (const mz of magicZ) {
    if (mz > Z_MAX) continue;
    const y = H - PAD - mz*CELL - CELL/2;
    ctx.beginPath(); ctx.moveTo(PAD, y); ctx.lineTo(W, y); ctx.stroke();
  }
  ctx.setLineDash([]);

  // 安定の谷ライン
  ctx.strokeStyle = 'rgba(168,255,120,0.18)';
  ctx.lineWidth = 1; ctx.setLineDash([3,5]);
  ctx.beginPath();
  for (let z=1; z<=Z_MAX; z++) {
    const nIdeal = z <= 20 ? z : z*1.25 + z*0.002*(z-20);
    const x = PAD + nIdeal*CELL + CELL/2;
    const y = H - PAD - z*CELL - CELL/2;
    z===1 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
  }
  ctx.stroke(); ctx.setLineDash([]);

  // コレクション済みセル
  canvas._cells = [];
  for (const c of collection) {
    if (c.z>Z_MAX || c.n_val>N_MAX) continue;
    const x = PAD + c.n_val*CELL, y = H - PAD - (c.z+1)*CELL;
    const grd = ctx.createLinearGradient(x,y,x+CELL,y+CELL);
    grd.addColorStop(0, c.color1+'ee'); grd.addColorStop(1, c.color2+'ee');
    ctx.fillStyle = grd; ctx.fillRect(x+1, y+1, CELL-2, CELL-2);
    ctx.strokeStyle = 'rgba(255,255,255,0.6)'; ctx.lineWidth = 0.8;
    ctx.strokeRect(x+1, y+1, CELL-2, CELL-2);
    ctx.fillStyle = stabColor(c.stability);
    ctx.beginPath(); ctx.arc(x+CELL-2, y+2, 1.5, 0, Math.PI*2); ctx.fill();
    canvas._cells.push({...c, rx:x, ry:y});
  }

  // 軸ラベル
  ctx.fillStyle = '#5a8aaa'; ctx.font = '9px Orbitron,monospace';
  ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
  for (let z=0; z<=Z_MAX; z+=10) ctx.fillText(z, PAD-4, H - PAD - z*CELL - CELL/2);
  ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  for (let nv=0; nv<=N_MAX; nv+=10) ctx.fillText(nv, PAD + nv*CELL + CELL/2, H-PAD+3);
  ctx.fillStyle = '#4a7a9b'; ctx.font = '10px Orbitron,monospace';
  ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
  ctx.fillText('N（中性子数）', PAD + N_MAX*CELL/2, H-2);
  ctx.save(); ctx.translate(12, H/2); ctx.rotate(-Math.PI/2);
  ctx.textBaseline = 'top'; ctx.fillText('Z（原子番号）', 0, 0); ctx.restore();

  // 魔法数ラベル
  ctx.fillStyle = 'rgba(255,209,102,0.45)'; ctx.font = '8px Orbitron,monospace';
  ctx.textAlign = 'left'; ctx.textBaseline = 'bottom';
  for (const mn of magicN) {
    if (mn > N_MAX) continue;
    ctx.fillText('N='+mn, PAD + mn*CELL + 2, H-PAD-2);
  }

  if (!canvas._evSet) {
    canvas._evSet = true;
    const tip = document.getElementById('cellTooltip');
    canvas.addEventListener('mousemove', ev => {
      const r = canvas.getBoundingClientRect();
      const mx = ev.clientX - r.left, my = ev.clientY - r.top;
      const found = (canvas._cells||[]).find(c => mx>=c.rx && mx<c.rx+CELL && my>=c.ry && my<c.ry+CELL);
      if (found) {
        tip.innerHTML = '<b>'+found.sym+'-'+found.A+'</b><br>Z='+found.z+' / N='+found.n_val+'<br>'+found.name+'・'+(found.stability==='stable'?'✓ 安定':found.stability==='unstable'?'☢ 放射性':'? 不明');
        tip.style.left = (ev.clientX+14)+'px'; tip.style.top = (ev.clientY-40)+'px';
        tip.classList.add('show');
      } else { tip.classList.remove('show'); }
    });
    canvas.addEventListener('mouseleave', () => document.getElementById('cellTooltip').classList.remove('show'));
    canvas.addEventListener('click', ev => {
      const r = canvas.getBoundingClientRect();
      const mx = ev.clientX - r.left, my = ev.clientY - r.top;
      const found = (canvas._cells||[]).find(c => mx>=c.rx && mx<c.rx+CELL && my>=c.ry && my<c.ry+CELL);
      if (found) jumpTo(found.z, found.n_val);
    });
  }
}

function scrollToLatestNuclide() {
  const scroll = document.getElementById('chartScroll');
  if (!scroll) return;
  const canvas = document.getElementById('nuclideChart');
  const H = canvas.height;

  // 対象核種を決定（コレクションあり→最新、なし→Z=1 N=0 の位置）
  const target = collection.length > 0
    ? collection[collection.length - 1]
    : { z: 1, n_val: 0 };

  const z  = Math.min(target.z,     Z_MAX);
  const nv = Math.min(target.n_val, N_MAX);

  // Canvas上のセル中心座標
  const cx = PAD + nv * CELL + CELL / 2;
  const cy = H - PAD - z * CELL - CELL / 2;

  // スクロールコンテナの中心にセルが来るよう設定
  scroll.scrollTo({
    left: Math.max(0, cx - scroll.clientWidth  / 2),
    top:  Math.max(0, cy - scroll.clientHeight / 2),
    behavior: collection.length > 0 ? 'smooth' : 'instant',
  });
}

function scrollToLatestElement() {
  if (p === 0) return;
  const scroll = document.querySelector('.ptable-scroll');
  if (!scroll) return;

  // PT_LAYOUTから現在のZ(p)のセル位置を探す
  const entry = PT_LAYOUT.find(([z]) => z === p);
  if (!entry) return;
  const [, row, col] = entry;

  // セルサイズ（38px）＋gap（3px）
  const cellW = 41, cellH = 49;
  const cellX = (col - 1) * cellW + cellW / 2;
  const cellY = (row - 1) * cellH + cellH / 2;

  scroll.scrollTo({
    left: Math.max(0, cellX - scroll.clientWidth / 2),
    top:  Math.max(0, cellY - scroll.clientHeight / 2),
    behavior: 'smooth',
  });
}
function drawNucleus() {
  const canvas = document.getElementById('nucleusCanvas');
  const ctx = canvas.getContext('2d');
  const total = p + n;
  const nucEl = document.getElementById('nucleus');

  if (total === 0) {
    canvas.width=80; canvas.height=80;
    nucEl.style.width='80px'; nucEl.style.height='80px';
    ctx.clearRect(0,0,80,80);
    ctx.beginPath(); ctx.arc(40,40,30,0,Math.PI*2);
    ctx.strokeStyle='rgba(255,255,255,0.1)'; ctx.lineWidth=1; ctx.stroke();
    document.getElementById('massNum').textContent='0';
    document.getElementById('pnRatio').textContent='p:n = 0:0';
    return;
  }

  // 粒子半径・キャンバスサイズを決定
  const PR = total <= 4 ? 5 : total <= 10 ? 4 : total <= 20 ? 3 : total <= 50 ? 2.5 : 2;
  const DISPLAY = Math.min(total, 60); // 表示する粒子数の上限

  // 六方最密充填で座標生成（内側から螺旋状に）
  function hexPositions(count) {
    const positions = [{x:0, y:0}];
    if (count === 1) return positions;
    // 六方格子：ring=1,2,3...と外側に広げる
    const dirs = [
      [1,0],[0.5, Math.sqrt(3)/2],[-0.5, Math.sqrt(3)/2],
      [-1,0],[-0.5,-Math.sqrt(3)/2],[0.5,-Math.sqrt(3)/2]
    ];
    let ring = 1;
    while (positions.length < count) {
      // 各リングの開始点
      let x = ring * dirs[4][0], y = ring * dirs[4][1];
      for (let side = 0; side < 6; side++) {
        for (let step = 0; step < ring; step++) {
          if (positions.length >= count) break;
          positions.push({x, y});
          x += dirs[side][0];
          y += dirs[side][1];
        }
        if (positions.length >= count) break;
      }
      ring++;
    }
    return positions;
  }

  const rawPos = hexPositions(DISPLAY);

  // バウンディングボックスからキャンバスサイズを決定
  const spacing = PR * 2 * 0.88; // 粒子間隔（少し重なる）
  let maxR = 0;
  rawPos.forEach(pos => {
    const d = Math.sqrt(pos.x*pos.x + pos.y*pos.y);
    if (d > maxR) maxR = d;
  });
  const clusterR = maxR * spacing + PR + 4;
  const sz = Math.ceil(clusterR * 2) + 8;
  const cx = sz / 2, cy = sz / 2;

  canvas.width = sz; canvas.height = sz;
  nucEl.style.width = sz+'px'; nucEl.style.height = sz+'px';
  ctx.clearRect(0, 0, sz, sz);

  // 外側グロー
  const glowR = clusterR * 0.9;
  const grd = ctx.createRadialGradient(cx, cy, glowR*0.2, cx, cy, glowR*1.3);
  grd.addColorStop(0, `rgba(${p>0?'255,77,109':'220,220,220'},0.25)`);
  grd.addColorStop(1, 'transparent');
  ctx.fillStyle = grd;
  ctx.beginPath(); ctx.arc(cx, cy, glowR*1.3, 0, Math.PI*2); ctx.fill();

  // 粒子を描画（陽子を先に並べてから中性子）
  // 配列をシャッフルして混ぜた配置にする
  const types = Array(p).fill('p').concat(Array(n).fill('n'));
  // 表示分をランダムに混ぜる（シードなし・固定シード風に交互配置）
  const displayTypes = [];
  const pShow = Math.round(DISPLAY * p / total);
  const nShow = DISPLAY - pShow;
  for (let i = 0; i < DISPLAY; i++) {
    // 交互に配置してなるべく混ざって見えるように
    if (i % 2 === 0 && displayTypes.filter(t=>t==='p').length < pShow) displayTypes.push('p');
    else if (displayTypes.filter(t=>t==='n').length < nShow) displayTypes.push('n');
    else displayTypes.push('p');
  }

  // 奥から手前の順に描画（y座標昇順）
  const sorted = rawPos.map((pos, i) => ({pos, type: displayTypes[i]}))
                       .sort((a, b) => a.pos.y - b.pos.y);

  sorted.forEach(({pos, type}) => {
    const bx = cx + pos.x * spacing;
    const by = cy + pos.y * spacing;
    const isP = type === 'p';

    // 影（奥行き感）
    ctx.beginPath(); ctx.arc(bx + PR*0.15, by + PR*0.2, PR, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(0,0,0,0.3)'; ctx.fill();

    // 球グラデーション
    const ng = ctx.createRadialGradient(bx - PR*0.3, by - PR*0.3, PR*0.1, bx, by, PR);
    if (isP) {
      ng.addColorStop(0, '#ffb3c1');
      ng.addColorStop(0.4, '#ff4d6d');
      ng.addColorStop(1, '#7b0020');
    } else {
      ng.addColorStop(0, '#ffffff');
      ng.addColorStop(0.4, '#d8d8d8');
      ng.addColorStop(1, '#888888');
    }
    ctx.beginPath(); ctx.arc(bx, by, PR, 0, Math.PI*2);
    ctx.fillStyle = ng; ctx.fill();
  });

  // 中心ハイライト
  const cg = ctx.createRadialGradient(cx - clusterR*0.15, cy - clusterR*0.15, 0, cx, cy, clusterR*0.5);
  cg.addColorStop(0, 'rgba(255,255,255,0.18)');
  cg.addColorStop(1, 'transparent');
  ctx.fillStyle = cg;
  ctx.beginPath(); ctx.arc(cx, cy, clusterR*0.5, 0, Math.PI*2); ctx.fill();

  document.getElementById('massNum').textContent = p+n;
  document.getElementById('pnRatio').textContent = `p:n = ${p}:${n}`;
}

// 指定された電子数eに対し、基底状態の殻配置を返す
// 中性原子（e=p）はGROUND_CONFIGを使用
// イオン（e≠p）は電子数に近い中性原子の配置を参考に調整
function getShellConfig(electronCount) {
  // まず中性原子のデータから探す
  if (GROUND_CONFIG[electronCount]) {
    return [...GROUND_CONFIG[electronCount]];
  }
  // イオン：電子数と同じ中性原子配置を基準に
  // 例：Na⁺(e=10)→Neの配置、Cl⁻(e=18)→Arの配置
  if (GROUND_CONFIG[electronCount]) return [...GROUND_CONFIG[electronCount]];

  // 中性原子データにない場合（通常は中性原子データが全Z分あるので到達しない）
  // フォールバック：単純な殻順
  const caps = [2,8,18,32,32,18,8];
  const result = [];
  let rem = electronCount;
  for (const cap of caps) {
    if (rem <= 0) break;
    const n = Math.min(rem, cap);
    result.push(n);
    rem -= n;
  }
  return result;
}

function drawElectrons() {
  const cont = document.getElementById('nucleusContainer');
  cont.querySelectorAll('.electron-dot, .noble-gas-badge').forEach(d => d.remove());
  if (!e) return;

  const isNoble = e > 0 && NOBLE_GAS_E.has(e);
  const cx = 80, cy = 80;

  // 基底状態の殻配置を取得
  const shellConfig = getShellConfig(e);

  // ===== 電子式(ルイス・ドット)的な配置順 =====
  // 1個→上、2個→上下、3個→上下左、4個→上下左右(十字)、
  // 5個→十字+右上、6個→十字+右上左上、7個→+左下、8個→+右下(8方位完成)
  // 9個以上は均等割(リング上に等間隔、12時から時計回り)
  // 角度(rad)。x=cos(angle), y=sin(angle), 0=右, -π/2=上(画面座標)
  const DIRS_8 = [
    -Math.PI / 2,            // 上
     Math.PI / 2,            // 下
     Math.PI,                // 左
     0,                      // 右
    -Math.PI / 4,            // 右上
    -3 * Math.PI / 4,        // 左上
     3 * Math.PI / 4,        // 左下
     Math.PI / 4,            // 右下
  ];

  function anglesFor(count) {
    if (count <= 8) {
      return DIRS_8.slice(0, count);
    }
    // 9個以上：均等割(12時から時計回り)
    const result = [];
    for (let i = 0; i < count; i++) {
      result.push((i / count) * Math.PI * 2 - Math.PI / 2);
    }
    return result;
  }

  shellConfig.forEach((count, si) => {
    if (count === 0 || si >= SHELL_RADII.length) return;
    const r = SHELL_RADII[si];
    const angles = anglesFor(count);
    for (let i = 0; i < count; i++) {
      const angle = angles[i];
      const dot = document.createElement('div');
      dot.className = 'electron-dot' + (isNoble ? ' noble' : '');
      dot.style.left = (cx + Math.cos(angle) * r) + 'px';
      dot.style.top  = (cy + Math.sin(angle) * r) + 'px';
      cont.appendChild(dot);
    }
  });

  // 希ガス配置バッジ
  if (isNoble && p !== e) {
    const badge = document.createElement('div');
    badge.className = 'noble-gas-badge';
    badge.textContent = '✦ ' + (NOBLE_GAS_NAMES[e] || '希ガス配置');
    cont.appendChild(badge);
  }
}

// 殻の設定（K=1〜P=6）
const SHELL_INFO = [
  { name:'K', cap:2  },
  { name:'L', cap:8  },
  { name:'M', cap:18 },
  { name:'N', cap:32 },
  { name:'O', cap:32 },
  { name:'P', cap:18 },
];
// 各殻の電子軌道半径（drawElectrons用）
const SHELL_RADII = [23, 40, 58, 75, 93, 111];
// 殻ラベルの right offset（軌道の半径に対応）
const SHELL_LABEL_OFFSET = [24, 41, 59, 76, 94, 112];

function updateOrbits(){
  const container = document.getElementById('nucleusContainer');
  const shellConfig = getShellConfig(e);
  const activeShells = shellConfig.filter(n => n > 0).length;

  for (let si = 5; si <= 6; si++) {
    const id = 'orbit' + si;
    let orbitEl = document.getElementById(id);
    const needed = activeShells >= si;
    if (needed && !orbitEl) {
      orbitEl = document.createElement('div');
      orbitEl.id = id;
      orbitEl.className = `orbit orbit-${si}`;
      const labelOffset = SHELL_LABEL_OFFSET[si - 1];
      orbitEl.innerHTML = `<span class="orbit-label" style="left:calc(50% + ${labelOffset}px)">${SHELL_INFO[si-1].name}</span>`;
      container.insertBefore(orbitEl, container.firstChild);
    } else if (!needed && orbitEl) {
      orbitEl.remove();
    }
  }

  for (let i = 1; i <= 6; i++) {
    const el = document.getElementById('orbit' + i);
    if (!el) continue;
    el.style.borderColor = i <= activeShells
      ? 'rgba(168,255,120,0.3)'
      : 'rgba(168,255,120,0.1)';
  }
}

function change(type,delta){
  if(type==='p') p=Math.max(0,Math.min(118,p+delta));
  if(type==='n') n=Math.max(0,Math.min(177,n+delta));
  if(type==='e') e=Math.max(0,Math.min(118,e+delta));
  update();
}

function updateChargeChart() {
  const MAX = Math.max(p, e, 1);
  const pPct = (p / MAX * 100).toFixed(1);
  const ePct = (e / MAX * 100).toFixed(1);
  const charge = p - e;

  document.getElementById('cgP').textContent = p;
  document.getElementById('cgE').textContent = e;
  document.getElementById('cgBarP').style.width = pPct + '%';
  document.getElementById('cgBarE').style.width = ePct + '%';

  const diffLine  = document.getElementById('cgDiffLine');
  const diffLabel = document.getElementById('cgDiffLabel');

  if (p === 0 && e === 0) {
    diffLine.style.background = 'transparent';
    diffLine.style.marginLeft = '0';
    diffLine.style.width = '0';
    diffLabel.textContent = '';
    return;
  }

  if (charge === 0) {
    diffLine.style.background = 'transparent';
    diffLine.style.left  = '0';
    diffLine.style.width = '0';
    diffLabel.textContent  = '中性';
    diffLabel.style.color  = 'var(--electron)';
    diffLabel.style.left   = '0';
    diffLabel.style.width  = '100%';
    diffLabel.style.fontSize = '14px';
  } else {
    const longer   = Math.max(p, e);
    const shorter  = Math.min(p, e);
    const isPositive = charge > 0;
    const shortPct = longer > 0 ? (shorter / longer * 100).toFixed(1) : 0;
    const diffPct  = longer > 0 ? ((longer - shorter) / longer * 100).toFixed(1) : 100;

    diffLine.style.left   = shortPct + '%';
    diffLine.style.width  = diffPct + '%';
    diffLine.style.background = isPositive
      ? 'linear-gradient(90deg,rgba(255,77,109,0.8),rgba(255,77,109,0.3))'
      : 'linear-gradient(90deg,rgba(255,209,102,0.8),rgba(255,209,102,0.3))';

    // ラベルをライン範囲の上に中央揃え
    diffLabel.style.left   = shortPct + '%';
    diffLabel.style.width  = diffPct + '%';
    diffLabel.style.fontSize = '20px';

    let chargeText;
    if      (charge ===  1) chargeText = '+';
    else if (charge === -1) chargeText = '−';
    else if (charge >   1)  chargeText = charge + '+';
    else                    chargeText = Math.abs(charge) + '−';

    diffLabel.textContent = chargeText;
    diffLabel.style.color = isPositive ? 'var(--proton)' : 'var(--electron)';
  }
}

function resetAll(){ p=0;n=0;e=0;update(); }

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

// ===== localStorage 保存・読み込み =====
const STORAGE_KEY = 'atomSimCollection';

function saveCollection() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(collection));
  } catch(e) {
    console.warn('保存失敗:', e);
  }
}

function loadCollection() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      collection = JSON.parse(saved);
      updateBadge();
      showToast(`${collection.length}件のコレクションを読み込みました`);
    }
  } catch(e) {
    console.warn('読み込み失敗:', e);
    collection = [];
  }
}

// 起動時に読み込み
loadCollection();
(function() {
  const TABS = ['simulator', 'chart', 'ptable'];
  let touchStartX = 0, touchStartY = 0;

  function currentTab() {
    return TABS.find(t => document.getElementById('tab-' + t).classList.contains('active')) || TABS[0];
  }

  document.addEventListener('touchstart', e => {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
  }, { passive: true });

  document.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - touchStartX;
    const dy = e.changedTouches[0].clientY - touchStartY;
    // 水平方向が優位かつ50px以上のスワイプ
    if (Math.abs(dx) < 50 || Math.abs(dx) < Math.abs(dy) * 1.5) return;

    const cur = currentTab();
    const idx = TABS.indexOf(cur);
    if (dx < 0 && idx < TABS.length - 1) {
      switchTab(TABS[idx + 1]); // 左スワイプ → 核種マップ
    } else if (dx > 0 && idx > 0) {
      switchTab(TABS[idx - 1]); // 右スワイプ → シミュレーター
    }
  }, { passive: true });
})();
